# ─────────────────────────────────────────────
# Son Kaynak — Geliştirme altyapısı (Faz 1)
# Sadece altyapı servisleri: Postgres, Redis, Meilisearch, MinIO.
# Uygulamalar (web, cms) bu fazda `pnpm dev` ile host'ta çalışır.
# Konteynerleştirme (web/cms/caddy) ileriki bir fazda eklenecek.
#
# Başlat:  docker compose up -d
# Durdur:  docker compose down
# ─────────────────────────────────────────────
name: sonkaynak

services:
  postgres:
    image: postgres:16-alpine
    container_name: sk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sonkaynak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sonkaynak_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-sonkaynak}
    ports:
      # Host 5433 → konteyner 5432 (host'ta 5432 başka bir projede dolu olabilir)
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonkaynak} -d ${POSTGRES_DB:-sonkaynak}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sk_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: sk_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_dev_master_key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: sk_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
  meili_data:
  minio_data:
